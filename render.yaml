services:
  - type: web
    name: miemie-pwa
    runtime: node
    plan: starter
    region: singapore
    rootDir: web
    buildCommand: npm install --omit=dev
    startCommand: node server/index.mjs
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: DATA_DIR
        value: /var/data/miemie
      - key: FAMILY_CODE
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: mailto:hello@miemie.app
    disk:
      name: miemie-data
      mountPath: /var/data
      sizeGB: 1
